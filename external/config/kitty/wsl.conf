# WSL-specific kitty configuration
# Note: Set environment variable KITTY_OS=wsl before launching kitty in WSL

# Font settings for WSL (Windows)
font_family      Fira Code Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 10.0

# CJK font mapping
symbol_map U+4E00-U+9FFF,U+3400-U+4DBF Sarasa Gothic Mono
