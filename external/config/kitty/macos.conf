# macOS-specific kitty configuration

# Font settings for macOS
font_family      Agave Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14.0

# CJK font mapping
symbol_map U+4E00-U+9FFF,U+3400-U+4DBF Sarasa Gothic SC

text_composition_strategy platform
macos_option_as_alt yes